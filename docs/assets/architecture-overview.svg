<svg width="1280" height="760" viewBox="0 0 1280 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="760" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7F3EA"/>
      <stop offset="1" stop-color="#E7F0EC"/>
    </linearGradient>
    <linearGradient id="cardA" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFF8ED"/>
      <stop offset="1" stop-color="#F5EAD5"/>
    </linearGradient>
    <linearGradient id="cardB" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#EFF8F5"/>
      <stop offset="1" stop-color="#D9ECE6"/>
    </linearGradient>
    <linearGradient id="cardC" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#F2F5FA"/>
      <stop offset="1" stop-color="#DDE6F2"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#6A6A6A" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#405261"/>
    </marker>
  </defs>

  <rect width="1280" height="760" fill="url(#bg)"/>
  <circle cx="165" cy="110" r="90" fill="#EED9B7" fill-opacity="0.55"/>
  <circle cx="1120" cy="610" r="120" fill="#CDE0D7" fill-opacity="0.55"/>

  <text x="84" y="76" fill="#20313C" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700">MyAITodo V1 Architecture</text>
  <text x="84" y="112" fill="#51626D" font-family="Segoe UI, Arial, sans-serif" font-size="18">Personal AI Todo full-stack architecture for V1 MVP</text>

  <rect x="84" y="170" rx="24" ry="24" width="245" height="210" fill="url(#cardA)" filter="url(#shadow)"/>
  <text x="112" y="222" fill="#20313C" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">Frontend</text>
  <text x="112" y="262" fill="#405261" font-family="Segoe UI, Arial, sans-serif" font-size="20">Next.js + TypeScript</text>
  <text x="112" y="294" fill="#405261" font-family="Segoe UI, Arial, sans-serif" font-size="20">Tailwind CSS</text>
  <text x="112" y="334" fill="#51626D" font-family="Segoe UI, Arial, sans-serif" font-size="18">Login / Todo List / AI Actions</text>
  <text x="112" y="364" fill="#51626D" font-family="Segoe UI, Arial, sans-serif" font-size="18">State, Forms, Feedback</text>

  <rect x="412" y="148" rx="24" ry="24" width="448" height="330" fill="url(#cardB)" filter="url(#shadow)"/>
  <text x="446" y="204" fill="#20313C" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">Backend</text>
  <text x="446" y="242" fill="#405261" font-family="Segoe UI, Arial, sans-serif" font-size="21">FastAPI + SQLAlchemy + Pydantic</text>
  <rect x="446" y="274" rx="14" ry="14" width="170" height="54" fill="#FFFFFF" fill-opacity="0.72"/>
  <rect x="636" y="274" rx="14" ry="14" width="170" height="54" fill="#FFFFFF" fill-opacity="0.72"/>
  <rect x="446" y="346" rx="14" ry="14" width="170" height="54" fill="#FFFFFF" fill-opacity="0.72"/>
  <rect x="636" y="346" rx="14" ry="14" width="170" height="54" fill="#FFFFFF" fill-opacity="0.72"/>
  <text x="476" y="308" fill="#20313C" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="600">Auth Module</text>
  <text x="668" y="308" fill="#20313C" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="600">Todo Module</text>
  <text x="468" y="380" fill="#20313C" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="600">AI Service</text>
  <text x="656" y="380" fill="#20313C" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="600">History Module</text>
  <text x="446" y="436" fill="#51626D" font-family="Segoe UI, Arial, sans-serif" font-size="18">JWT auth, Todo CRUD, AI orchestration, persistence, response shaping</text>

  <rect x="940" y="170" rx="24" ry="24" width="258" height="150" fill="url(#cardC)" filter="url(#shadow)"/>
  <text x="972" y="224" fill="#20313C" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">Database</text>
  <text x="972" y="264" fill="#405261" font-family="Segoe UI, Arial, sans-serif" font-size="21">MySQL</text>
  <text x="972" y="298" fill="#51626D" font-family="Segoe UI, Arial, sans-serif" font-size="18">Users / Todos / Histories</text>

  <rect x="940" y="372" rx="24" ry="24" width="258" height="150" fill="#F4EFE7" filter="url(#shadow)"/>
  <text x="972" y="426" fill="#20313C" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">AI Provider</text>
  <text x="972" y="466" fill="#405261" font-family="Segoe UI, Arial, sans-serif" font-size="21">OpenAI-compatible API</text>
  <text x="972" y="500" fill="#51626D" font-family="Segoe UI, Arial, sans-serif" font-size="18">Rewrite / Decompose / Priority</text>

  <path d="M330 274 C360 274, 372 274, 404 274" stroke="#405261" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <path d="M862 246 C898 246, 904 246, 932 246" stroke="#405261" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <path d="M862 416 C898 416, 904 416, 932 416" stroke="#405261" stroke-width="4" fill="none" marker-end="url(#arrow)"/>

  <text x="340" y="254" fill="#51626D" font-family="Segoe UI, Arial, sans-serif" font-size="16">HTTP / JSON</text>
  <text x="874" y="226" fill="#51626D" font-family="Segoe UI, Arial, sans-serif" font-size="16">SQLAlchemy</text>
  <text x="878" y="396" fill="#51626D" font-family="Segoe UI, Arial, sans-serif" font-size="16">Prompt + API call</text>

  <rect x="84" y="474" rx="24" ry="24" width="1114" height="178" fill="#FFFFFF" fill-opacity="0.68" filter="url(#shadow)"/>
  <text x="116" y="528" fill="#20313C" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">Primary V1 Data Flow</text>
  <text x="116" y="572" fill="#405261" font-family="Segoe UI, Arial, sans-serif" font-size="20">1. User creates or edits a task in the frontend</text>
  <text x="116" y="604" fill="#405261" font-family="Segoe UI, Arial, sans-serif" font-size="20">2. Frontend calls backend API with JWT</text>
  <text x="116" y="636" fill="#405261" font-family="Segoe UI, Arial, sans-serif" font-size="20">3. Backend validates, stores data in MySQL, and optionally calls AI for rewrite / decompose / priority</text>
  <text x="116" y="668" fill="#405261" font-family="Segoe UI, Arial, sans-serif" font-size="20">4. Backend returns structured results and frontend renders actionable feedback</text>
</svg>
